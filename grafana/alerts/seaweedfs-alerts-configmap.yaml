apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-alerts
data:
  seaweedfs-alerts.yaml: |
    apiVersion: 1

    contactPoints:
      - orgId: 1
        name: email
        receivers:
          - uid: email-receiver
            type: email
            settings:
              addresses: jutonz@hey.com

    policies:
      - orgId: 1
        receiver: email
        routes:
          - receiver: email
            matchers:
              - alertname="SeaweedFS Volume Nearly Full"
            repeat_interval: 24h

    groups:
      - orgId: 1
        name: seaweedfs
        folder: Infrastructure
        interval: 1m
        rules:
          - uid: seaweedfs-volume-usage
            title: SeaweedFS Volume Nearly Full
            condition: C
            data:
              - refId: A
                datasourceUid: eeixzlo2rzd34b
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  expr: |
                    (
                      kubelet_volume_stats_used_bytes{namespace="seaweedfs", persistentvolumeclaim="data-volume-0"}
                      /
                      kubelet_volume_stats_capacity_bytes{namespace="seaweedfs", persistentvolumeclaim="data-volume-0"}
                    ) * 100
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: C
                datasourceUid: __expr__
                relativeTimeRange:
                  from: 600
                  to: 0
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        params: [85]
                        type: gt
            noDataState: NoData
            execErrState: Error
            for: 5m
            annotations:
              summary: SeaweedFS /data volume is {{ printf "%.1f" $values.A.Value }}% full
              description: The data-volume-0 PVC in the seaweedfs namespace is nearly full. Vacuum old volumes or expand the PVC.
            labels:
              severity: warning
