---
- name: Install snapclient
  hosts: all
  become: true
  vars:
    # see https://github.com/snapcast/snapcast/tags
    version: "0.35.0"
    snapcast_src: /Users/jutonz/code/snapcast/snapcast
    build_image: balenalib/raspberry-pi-debian:bullseye-build
    build_container: snapclient-build
  tasks:
    - name: Install runtime dependencies
      ansible.builtin.apt:
        name:
          - alsa-utils
          - avahi-daemon
          - libasound2
          - libavahi-client3
          - libexpat1
          - libflac8
          - libopus0
          - libsoxr0
          - libssl1.1
          - libvorbis0a
          - libvorbisidec1
        state: present
        update_cache: true

    - name: Check if installed
      ansible.builtin.shell: command -v snapclient && snapclient --version | grep -q "v{{ version }}"
      register: installed_check
      ignore_errors: true
      changed_when: false

    - name: Build snapclient in Docker
      delegate_to: localhost
      become: false
      community.docker.docker_container:
        name: "{{ build_container }}"
        image: "{{ build_image }}"
        platform: linux/arm/v6
        command: >
          bash -lc "
            apt-get update &&
            apt-get install -y --no-install-recommends
              build-essential cmake
              libasound2-dev libavahi-client-dev libboost-dev libexpat1-dev
              libflac-dev libopus-dev libsoxr-dev libssl-dev libvorbis-dev
              libvorbisidec-dev &&
            mkdir -p /src/build &&
            cd /src/build &&
            cmake .. -DBUILD_SERVER=OFF &&
            cmake --build .
          "
        volumes:
          - "{{ snapcast_src }}:/src"
        auto_remove: false
        detach: false
      run_once: true
      when: installed_check.rc != 0

    - name: Remove build container
      delegate_to: localhost
      become: false
      community.docker.docker_container:
        name: "{{ build_container }}"
        state: absent
      run_once: true
      when: installed_check.rc != 0

    - name: Check if snapclient service exists
      ansible.builtin.stat:
        path: /usr/lib/systemd/system/snapclient.service
      register: service_file

    - name: Stop service before updating binary
      ansible.builtin.systemd:
        name: snapclient
        state: stopped
      when: installed_check.rc != 0 and service_file.stat.exists

    - name: Copy snapclient binary to host
      ansible.builtin.copy:
        src: "{{ snapcast_src }}/bin/snapclient"
        dest: /usr/local/bin/snapclient
        mode: "0755"
      when: installed_check.rc != 0

    - name: Setup service
      ansible.builtin.template:
        src: ./files/snapclient.service.j2
        dest: /usr/lib/systemd/system/snapclient.service
        mode: "0644"

    - name: Enable and start service
      ansible.builtin.systemd:
        name: snapclient
        state: restarted
        enabled: true
        daemon_reload: true
