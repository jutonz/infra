---
- name: Install snapclient
  hosts: all
  become: true
  vars:
    # see https://github.com/snapcast/snapcast/tags
    version: "0.35.0"
    build_output: /tmp/snapclient-build
  tasks:
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - build-essential
          - cmake
          - git
          - libasound2-dev
          - libavahi-client-dev
          - libboost-all-dev
          - libexpat1-dev
          - libflac-dev
          - libopus-dev
          - libpulse-dev
          - libsoxr-dev
          - libssl-dev
          - libvorbis-dev
          - libvorbisidec-dev
        state: present
        update_cache: true

    - name: Check if installed
      ansible.builtin.shell: command -v snapclient && snapclient --version | grep -q "v{{ version }}"
      register: installed_check
      ignore_errors: true
      changed_when: false

    - name: Build snapclient in Docker
      delegate_to: localhost
      become: false
      ansible.builtin.shell:
        cmd: |
          mkdir -p "{{ build_output }}/{{ inventory_hostname }}" && \
          docker run --rm --platform {{ docker_platform }} \
            -v "{{ build_output }}/{{ inventory_hostname }}:/out" \
            "{{ build_image }}" \
            bash -lc '\
              apt-get update && \
              apt-get install -y --no-install-recommends \
                build-essential ca-certificates cmake git pkg-config \
                libasound2-dev libavahi-client-dev libboost-dev libexpat1-dev \
                libflac-dev libopus-dev libsoxr-dev libssl-dev libvorbis-dev \
                libvorbisidec-dev && \
              git clone --depth 1 --branch v{{ version }} https://github.com/snapcast/snapcast.git /src && \
              mkdir -p /src/build && \
              cd /src/build && \
              cmake .. -DBUILD_SERVER=OFF && \
              cmake --build . && \
              cp /src/bin/snapclient /out/ \
            '
      changed_when: true
      when: installed_check.rc != 0

    - name: Check if snapclient service exists
      ansible.builtin.stat:
        path: /usr/lib/systemd/system/snapclient.service
      register: service_file

    - name: Stop service before updating binary
      ansible.builtin.systemd:
        name: snapclient
        state: stopped
      when: installed_check.rc != 0 and service_file.stat.exists

    - name: Copy snapclient binary to host
      ansible.builtin.copy:
        src: "{{ build_output }}/{{ inventory_hostname }}/snapclient"
        dest: /usr/local/bin/snapclient
        mode: "0755"
      when: installed_check.rc != 0

    - name: Setup service
      ansible.builtin.template:
        src: ./files/snapclient.service.j2
        dest: /usr/lib/systemd/system/snapclient.service
        mode: "0644"

    - name: Enable and start service
      ansible.builtin.systemd:
        name: snapclient
        state: restarted
        enabled: true
        daemon_reload: true
