---
- name: Install snapserver w/ librespot
  hosts: all
  become: true
  vars:
    # see https://github.com/badaix/snapcast/releases
    version: "0.35.0"
    arch: "amd64"
  tasks:
    - name: Install alsa-utils
      ansible.builtin.apt:
        name: alsa-utils
        state: present

    - name: Create /run/snapserver directory
      ansible.builtin.file:
        path: /run/snapserver
        state: directory
        owner: snapserver
        group: snapserver
        mode: "0755"

    - name: Download snapserver .deb
      ansible.builtin.get_url:
        url: "https://github.com/badaix/snapcast/releases/download/v{{ version }}/snapserver_{{ version }}-1_{{ arch }}_bookworm.deb"
        dest: "/tmp/snapserver_{{ version }}.deb"
        mode: "0644"

    - name: Install snapserver .deb
      ansible.builtin.apt:
        deb: "/tmp/snapserver_{{ version }}.deb"
        state: present

    - name: Copy snapserver defaults
      ansible.builtin.copy:
        src: ./files/snapserver
        dest: /etc/default/snapserver
        mode: "0644"

    - name: Copy snapserver config
      ansible.builtin.copy:
        src: ./files/snapserver.conf
        dest: /etc/snapserver.conf
        mode: "0644"

    - name: Start snapserver
      ansible.builtin.systemd:
        name: snapserver
        state: restarted

    - name: Copy metrics script
      ansible.builtin.copy:
        src: ./files/metrics.rb
        dest: /etc/snapserver/metrics.rb
        mode: "0644"

    - name: Install ruby
      ansible.builtin.apt:
        name: ruby
        state: present

    - name: Create metrics service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/snapserver_metrics.service
        content: |
          [Unit]
          Description=Report snapserver metrics to prometheus

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/ruby /etc/snapserver/metrics.rb
          User=root
          Group=root
        mode: "0644"

    - name: Create systemd timer file
      ansible.builtin.copy:
        dest: /etc/systemd/system/snapserver_metrics.timer
        content: |
          [Unit]
          Description=Timer to run snapserver metrics

          [Timer]
          OnCalendar=*-*-* *:*:00
          Unit=snapserver_metrics.service
          Persistent=true

          [Install]
          WantedBy=timers.target
        mode: "0644"

    - name: Enable and start metrics service
      ansible.builtin.systemd:
        name: snapserver_metrics.timer
        state: started
        daemon_reload: true
        enabled: true

    - name: Create snapserver restart service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/snapserver_restart.service
        content: |
          [Unit]
          Description=Restart snapserver

          [Service]
          Type=oneshot
          ExecStart=/bin/systemctl restart snapserver
          User=root
          Group=root
        mode: "0644"

    - name: Create snapserver restart timer file
      ansible.builtin.copy:
        dest: /etc/systemd/system/snapserver_restart.timer
        content: |
          [Unit]
          Description=Daily snapserver restart at 5pm Eastern

          [Timer]
          OnCalendar=*-*-* 17:00:00 America/New_York
          Unit=snapserver_restart.service
          Persistent=true

          [Install]
          WantedBy=timers.target
        mode: "0644"

    - name: Enable and start snapserver restart timer
      ansible.builtin.systemd:
        name: snapserver_restart.timer
        state: started
        daemon_reload: true
        enabled: true
